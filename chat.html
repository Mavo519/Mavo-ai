<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mavo AI Chat</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0b1020;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:700px;
background:#16213e;
padding:20px;
border-radius:15px;
}

h1{
color:#00d4ff;
text-align:center;
}

#chat{
height:350px;
overflow-y:auto;
background:#0f172a;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:75%;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
background:#00d4ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.message{
margin:10px 0;
}
</style>

</head>

<body>

<div class="container">

<h1>Mavo AI Chat</h1>

<div id="chat">
<div class="message"><b>Mavo AI:</b> Welcome! Ask me anything.</div>
</div>

<input id="message" placeholder="Ask Mavo AI anything...">
<button onclick="sendMessage()">Send</button>

</div>


<script>
async function sendMessage(){

const input = document.getElementById("message");
const chat = document.getElementById("chat");

let question = input.value;

if(question.trim()=="") return;

chat.innerHTML += "<div class='message'><b>You:</b> "+question+"</div>";

input.value="";

chat.innerHTML += "<div class='message'><b>Mavo AI:</b> Thinking...</div>";

try {

let response = await fetch("/api/chat", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:question
})
});

let data = await response.json();

chat.innerHTML += "<div class='message'><b>Mavo AI:</b> "+data.reply+"</div>";

} catch(error){

chat.innerHTML += "<div class='message'><b>Mavo AI:</b> Sorry, something went wrong.</div>";

}

chat.scrollTop = chat.scrollHeight;

}
</script>

</body>
</html>
